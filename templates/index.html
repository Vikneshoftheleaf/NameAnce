    <script>
        // Initialize Icons
        lucide.createIcons();
function copyToClipboard(text, btnElement) {
    // Standard Clipboard API
    navigator.clipboard.writeText(text).then(() => {
        // Find the icon inside the clicked button
        const icon = btnElement.querySelector('i');
        
        // Visual feedback: Change icon to checkmark
        icon.setAttribute('data-lucide', 'check');
        icon.classList.remove('text-gray-custom');
        icon.classList.add('text-emerald-500');
        lucide.createIcons(); // Refresh icons to show checkmark

        // Reset back to copy icon after 2 seconds
        setTimeout(() => {
            icon.setAttribute('data-lucide', 'copy');
            icon.classList.remove('text-emerald-500');
            icon.classList.add('text-gray-custom');
            lucide.createIcons();
        }, 2000);
    }).catch(err => {
        console.error('Failed to copy: ', err);
    });
}
        document.getElementById('generateBtn').addEventListener('click', fetchDomains);

        async function fetchDomains() {
            const description = document.getElementById('description').value;
            const extension = document.getElementById('extension').value;
            const resultsGrid = document.getElementById('resultsGrid');
            const resultsSection = document.getElementById('resultsSection');
            const mainContainer = document.getElementById('mainContainer');
            const formSection = document.getElementById('formSection');

            if (!description) return;

            // Loading State UI
            resultsGrid.innerHTML = `
                <div class="col-span-full py-12 flex flex-col items-center justify-center text-gray-custom">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-rose-500 mb-4"></div>
                    <p>Analyzing brand potential...</p>
                </div>`;

            // Transition Layout
            mainContainer.classList.remove('justify-center');
            resultsSection.classList.remove('hidden');
            setTimeout(() => {
                resultsSection.classList.add('opacity-100', 'translate-x-0');
            }, 50);

            const API_BASE_URL = 'https://nameance.vercel.app'; // Change this to your actual API URL
            const apiUrl = `${API_BASE_URL}/domains?description=${encodeURIComponent(description)}&extension=${encodeURIComponent(extension)}`;

            try {
                const response = await fetch(apiUrl);
                const data = await response.json();

                if (data.available_domains && data.available_domains.length > 0) {
    resultsGrid.innerHTML = '';
    data.available_domains.forEach(domain => {
    resultsGrid.innerHTML += `
        <div class="glass p-5 rounded-2xl flex items-center justify-between group hover:border-rose-500/50 transition-all border border-white/5">
            <div class="flex items-center gap-3">
                <div class="relative flex h-2.5 w-2.5">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-emerald-500"></span>
                </div>
                <div>
                    <h3 class="font-bold text-lg text-white tracking-tight">${domain}</h3>
                </div>
            </div>
            
            <button onclick="copyToClipboard('${domain}', this)" 
                class="bg-white/5 hover:bg-white/10 p-2.5 rounded-xl transition-all flex items-center justify-center border border-white/10 active:scale-90 group/btn"
                title="Copy Domain">
                <i data-lucide="copy" class="w-5 h-5 text-gray-custom group-hover/btn:text-white transition-colors"></i>
            </button>
        </div>`;
});
lucide.createIcons();
lucide.createIcons();
}
            } catch (error) {
                resultsGrid.innerHTML = `<p class="col-span-full text-rose-500 text-center py-10">Error connecting to server. Is your Flask API running?</p>`;
            }
        }
    </script>
